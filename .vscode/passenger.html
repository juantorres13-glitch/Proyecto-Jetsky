<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JetSky - Datos del Pasajero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-blue-50 to-white min-h-screen">

  <header class="bg-white shadow-sm">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-plane text-4xl text-[#69d7f7]"></i>
        <span class="text-3xl font-bold text-[#69d7f7]">JetSky</span>
      </div>
      <a href="flight-details.html" class="flex items-center gap-2 text-gray-700 hover:text-black">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Volver</span>
      </a>
    </nav>
  </header>

  <div class="max-w-5xl mx-auto px-6 py-12">
    <div class="bg-white rounded-3xl shadow-xl p-10">
      <h2 class="text-3xl font-bold text-center mb-10">Información del Pasajero</h2>

      <form id="passengerForm" class="space-y-8">
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium mb-2">Nombre Completo *</label>
            <input type="text" id="fullName" required
                   class="w-full h-14 border border-gray-300 rounded-2xl px-6 focus:outline-none focus:border-[#69d7f7]"
                   placeholder="Juan David Pérez">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Correo Electrónico *</label>
            <input type="email" id="email" required
                   class="w-full h-14 border border-gray-300 rounded-2xl px-6 focus:outline-none focus:border-[#69d7f7]"
                   placeholder="juan@example.com">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Teléfono *</label>
            <input type="tel" id="phone" required
                   class="w-full h-14 border border-gray-300 rounded-2xl px-6 focus:outline-none focus:border-[#69d7f7]"
                   placeholder="+57 300 123 4567">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Tipo de Documento</label>
            <select id="documentType" class="w-full h-14 border border-gray-300 rounded-2xl px-6">
              <option value="CC">Cédula de Ciudadanía</option>
              <option value="CE">Cédula de Extranjería</option>
              <option value="PA">Pasaporte</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Número de Documento</label>
          <input type="text" id="documentNumber"
                 class="w-full h-14 border border-gray-300 rounded-2xl px-6 focus:outline-none focus:border-[#69d7f7]"
                 placeholder="1234567890">
        </div>

        <div class="bg-blue-50 p-6 rounded-2xl flex items-start gap-4">
          <i class="fa-solid fa-shield-alt text-2xl text-[#69d7f7] mt-1"></i>
          <p class="text-sm text-gray-700">
            Tus datos personales están protegidos y solo serán utilizados para procesar tu reserva.
          </p>
        </div>

        <div class="flex justify-end pt-6">
          <button type="submit"
            class="bg-[#f89f37] hover:bg-[#e68817] text-white px-14 py-5 rounded-2xl text-xl font-semibold flex items-center gap-3">
            Continuar a selección de asientos
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const passengerForm = document.getElementById('passengerForm');

    passengerForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const passengerData = {
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        documentType: document.getElementById('documentType').value,
        documentNumber: document.getElementById('documentNumber').value.trim()
      };

      // Validación básica
      if (!passengerData.fullName || !passengerData.email || !passengerData.phone) {
        alert("Por favor completa los campos obligatorios (Nombre, Email y Teléfono)");
        return;
      }

      localStorage.setItem('passengerInfo', JSON.stringify(passengerData));
      window.location.href = 'seats.html';
    });
  </script>
</body>
</html>
