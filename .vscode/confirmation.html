<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JetSky - Reserva Confirmada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-blue-50 to-white min-h-screen">

  <header class="bg-white shadow-sm">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-plane text-4xl text-[#69d7f7]"></i>
        <span class="text-3xl font-bold text-[#69d7f7]">JetSky</span>
      </div>
      <a href="index.html" class="text-[#69d7f7] font-medium">Volver al inicio</a>
    </nav>
  </header>

  <div class="max-w-4xl mx-auto px-6 py-16">
    <div class="bg-white rounded-3xl shadow-2xl p-12 text-center">
      
      <!-- Icono de éxito -->
      <div class="mx-auto w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-8">
        <i class="fa-solid fa-check-circle text-6xl text-green-600"></i>
      </div>

      <h1 class="text-4xl font-bold text-[#0F172A] mb-3">¡Reserva Confirmada!</h1>
      <p class="text-xl text-gray-600 mb-10">Tu vuelo ha sido reservado exitosamente</p>

      <div class="bg-gradient-to-r from-[#69d7f7] to-[#4dc4e6] text-white rounded-2xl p-8 mb-10">
        <p class="text-sm opacity-90 mb-1">Código de Reserva</p>
        <p id="bookingId" class="text-4xl font-bold tracking-widest"></p>
      </div>

      <div class="grid md:grid-cols-2 gap-10 text-left">
        <!-- Detalles del Vuelo -->
        <div>
          <h3 class="font-bold text-lg mb-4 text-[#0F172A]">Detalles del Vuelo</h3>
          <div id="flightDetails" class="space-y-3 text-sm"></div>
        </div>

        <!-- Información del Pasajero -->
        <div>
          <h3 class="font-bold text-lg mb-4 text-[#0F172A]">Pasajero</h3>
          <div id="passengerDetails" class="space-y-3 text-sm"></div>
        </div>
      </div>

      <div class="mt-12 bg-blue-50 p-6 rounded-2xl">
        <div class="flex items-start gap-4">
          <i class="fa-solid fa-envelope text-2xl text-[#69d7f7] mt-1"></i>
          <div class="text-left">
            <p class="font-semibold text-[#0F172A]">Confirmación enviada</p>
            <p class="text-sm text-gray-600" id="emailSent"></p>
          </div>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-4 justify-center mt-12">
        <a href="index.html" 
           class="px-10 py-5 bg-[#69d7f7] hover:bg-[#4dc4e6] text-white rounded-2xl font-semibold text-lg">
          Hacer otra reserva
        </a>
        <a href="dashboard.html" 
           class="px-10 py-5 bg-[#f89f37] hover:bg-[#e68817] text-white rounded-2xl font-semibold text-lg">
          Ir a Mi Panel
        </a>
      </div>
    </div>
  </div>

  <script>
    const confirmation = JSON.parse(localStorage.getItem('bookingConfirmation') || '{}');
    const searchData = JSON.parse(localStorage.getItem('searchData') || '{}');

    if (!confirmation.bookingId) {
      window.location.href = 'index.html';
    }

    // Mostrar Código de Reserva
    document.getElementById('bookingId').textContent = confirmation.bookingId;

    // Detalles del Vuelo
    const flightDiv = document.getElementById('flightDetails');
    flightDiv.innerHTML = `
      <div class="flex justify-between">
        <span class="text-gray-600">Vuelo:</span>
        <span class="font-medium">${confirmation.flight.flightNumber}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Ruta:</span>
        <span class="font-medium">${confirmation.flight.origin} → ${confirmation.flight.destination}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Fecha:</span>
        <span class="font-medium">${confirmation.flight.date}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Horario:</span>
        <span class="font-medium">${confirmation.flight.departureTime} - ${confirmation.flight.arrivalTime}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Asientos:</span>
        <span class="font-medium">${confirmation.seats ? confirmation.seats.join(', ') : 'No seleccionados'}</span>
      </div>
    `;

    // Información del Pasajero
    const passengerDiv = document.getElementById('passengerDetails');
    passengerDiv.innerHTML = `
      <div class="flex justify-between">
        <span class="text-gray-600">Nombre:</span>
        <span class="font-medium">${confirmation.passenger.fullName || 'N/A'}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Email:</span>
        <span class="font-medium">${confirmation.passenger.email || 'N/A'}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Teléfono:</span>
        <span class="font-medium">${confirmation.passenger.phone || 'N/A'}</span>
      </div>
      <div class="flex justify-between pt-4 border-t">
        <span class="text-gray-600 font-semibold">Total Pagado:</span>
        <span class="font-bold text-[#f89f37] text-lg">
          $${confirmation.totalAmount.toLocaleString('es-CO')} COP
        </span>
      </div>
    `;

    // Email enviado
    document.getElementById('emailSent').textContent = 
      `Hemos enviado los detalles a ${confirmation.passenger.email || 'tu correo registrado'}. Revisa tu bandeja de entrada.`;

    // Limpiar localStorage al finalizar (opcional)
    // localStorage.clear(); // Descomenta si quieres limpiar todo al confirmar
  </script>
</body>
</html>
