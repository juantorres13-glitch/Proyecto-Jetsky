<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JetSky - Selecciona tus Asientos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .seat {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .seat:hover:not(.occupied):not(.selected) {
      transform: scale(1.15);
    }
    .seat.occupied {
      background-color: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
    }
    .seat.selected {
      background-color: #69d7f7;
      color: white;
      border: 2px solid #4dc4e6;
      transform: scale(1.1);
    }
    .seat.available {
      background-color: #d1fae5;
      border: 2px solid #10b981;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-white min-h-screen">

  <header class="bg-white shadow-sm">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-plane text-4xl text-[#69d7f7]"></i>
        <span class="text-3xl font-bold text-[#69d7f7]">JetSky</span>
      </div>
      <a href="passenger.html" class="flex items-center gap-2 text-gray-700 hover:text-black">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Volver</span>
      </a>
    </nav>
  </header>

  <div class="max-w-5xl mx-auto px-6 py-12">
    <div class="bg-white rounded-3xl shadow-xl p-10">
      <h2 class="text-3xl font-bold text-center mb-4">Selecciona tus Asientos</h2>
      <p class="text-center text-gray-600 mb-10" id="seatInfo">Selecciona <span class="font-semibold text-[#f89f37]" id="numSeats">1</span> asiento(s)</p>

      <!-- Leyenda -->
      <div class="flex justify-center gap-8 mb-10 text-sm">
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-[#d1fae5] border-2 border-[#10b981] rounded"></div>
          <span>Disponible</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-[#69d7f7] border-2 border-[#4dc4e6] rounded"></div>
          <span>Seleccionado</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-gray-200 border-2 border-gray-400 rounded"></div>
          <span>Ocupado</span>
        </div>
      </div>

      <!-- Mapa de asientos -->
      <div class="bg-gray-50 p-8 rounded-2xl mb-10">
        <!-- Cabina -->
        <div class="text-center mb-6">
          <div class="inline-block bg-[#69d7f7] text-white px-8 py-2 rounded-t-3xl text-sm font-medium">
            CABINA DEL PILOTO
          </div>
        </div>

        <div id="seatMap" class="grid grid-cols-7 gap-3 max-w-md mx-auto"></div>
      </div>

      <div class="flex justify-between items-center">
        <div>
          <p class="text-sm text-gray-600">Asientos seleccionados:</p>
          <p id="selectedSeatsDisplay" class="text-2xl font-bold text-[#f89f37]">Ninguno</p>
        </div>
        <button onclick="continueToPayment()" id="continueBtn"
          class="bg-[#f89f37] hover:bg-[#e68817] text-white px-12 py-5 rounded-2xl text-lg font-semibold disabled:opacity-50"
          disabled>
          Continuar al Pago
        </button>
      </div>
    </div>
  </div>

  <script>
    const selectedFlight = JSON.parse(localStorage.getItem('selectedFlight') || '{}');
    const searchData = JSON.parse(localStorage.getItem('searchData') || '{}');
    const passengerInfo = JSON.parse(localStorage.getItem('passengerInfo') || '{}');

    let selectedSeats = [];
    const numPassengers = parseInt(searchData.passengers) || 1;

    if (!selectedFlight.id) {
      window.location.href = 'results.html';
    }

    document.getElementById('numSeats').textContent = numPassengers;

    // Asientos ocupados de ejemplo
    const occupiedSeats = ['1A', '1B', '2C', '3D', '5A', '7F', '8B', '10C', '12E', '15A'];

    function generateSeatMap() {
      const seatMap = document.getElementById('seatMap');
      seatMap.innerHTML = '';

      // Cabeceras de columnas (A B C | D E F)
      const headers = ['A', 'B', 'C', '', 'D', 'E', 'F'];
      headers.forEach(header => {
        const div = document.createElement('div');
        div.className = 'text-center font-bold text-gray-500 text-sm';
        div.textContent = header;
        seatMap.appendChild(div);
      });

      // Generar filas 1 a 20
      for (let row = 1; row <= 20; row++) {
        ['A', 'B', 'C', 'aisle', 'D', 'E', 'F'].forEach(letter => {
          if (letter === 'aisle') {
            const aisle = document.createElement('div');
            aisle.className = 'flex items-center justify-center text-xs text-gray-400 font-medium';
            aisle.textContent = row;
            seatMap.appendChild(aisle);
            return;
          }

          const seatId = `${row}${letter}`;
          const isOccupied = occupiedSeats.includes(seatId);
          const isSelected = selectedSeats.includes(seatId);

          const seat = document.createElement('button');
          seat.className = `seat ${isOccupied ? 'occupied' : isSelected ? 'selected' : 'available'}`;
          seat.textContent = seatId;
          seat.disabled = isOccupied;

          seat.addEventListener('click', () => {
            if (isOccupied) return;

            if (selectedSeats.includes(seatId)) {
              selectedSeats = selectedSeats.filter(s => s !== seatId);
            } else if (selectedSeats.length < numPassengers) {
              selectedSeats.push(seatId);
            }

            generateSeatMap(); // Actualizar mapa
            updateSelectedDisplay();
          });

          seatMap.appendChild(seat);
        });
      }
    }

    function updateSelectedDisplay() {
      document.getElementById('selectedSeatsDisplay').textContent = 
        selectedSeats.length > 0 ? selectedSeats.join(', ') : 'Ninguno';

      document.getElementById('continueBtn').disabled = selectedSeats.length !== numPassengers;
    }

    function continueToPayment() {
      if (selectedSeats.length !== numPassengers) {
        alert(`Debes seleccionar exactamente ${numPassengers} asiento(s)`);
        return;
      }

      localStorage.setItem('selectedSeats', JSON.stringify(selectedSeats));
      window.location.href = 'payment.html';
    }

    // Inicializar
    generateSeatMap();
    updateSelectedDisplay();
  </script>
</body>
</html>
